<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlanTravel — Destination Tab Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,300&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --pr:#2563EB;--opr:#FFF;--prc:#DBEAFE;--oprc:#1E3A8A;
  --sec:#7C3AED;--osec:#FFF;--secc:#EDE9FE;--osecc:#4C1D95;
  --ter:#D97706;
  --bg:#F8FAFF;--surf:#FFF;--surfv:#EDF1FB;
  --ons:#0F172A;--onsv:#475569;
  --out:#C4CEDF;--outv:#DDE3F0;
  --err:#B3261E;
}
body{
  font-family:'Plus Jakarta Sans',sans-serif;
  background:radial-gradient(ellipse at 20% 10%,#0d1b3e 0%,#0a0c14 60%);
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  padding:24px 16px 32px;gap:16px;
}

/* ── Controls ── */
.ctrl-wrap{display:flex;flex-direction:column;align-items:center;gap:10px;width:100%}
.ctrl-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap;justify-content:center}
.ctrl-group{display:flex;background:#131929;border-radius:100px;padding:4px;border:1px solid #1e2a45}
.ctrl-label{font-size:10px;color:#5a6a8a;padding:6px 10px;letter-spacing:.1em;text-transform:uppercase;font-weight:600}
.ctb{
  padding:6px 18px;border:none;border-radius:100px;background:transparent;
  color:#5a6a8a;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;
  font-weight:600;cursor:pointer;transition:all .18s;
}
.ctb:hover{color:#93afd4}
.ctb.on{background:var(--pr);color:#fff;box-shadow:0 2px 12px rgba(37,99,235,.4)}
.vdesc{
  max-width:400px;text-align:center;color:#4a5a7a;font-size:12px;
  line-height:1.6;padding:0 8px;min-height:40px;
}
.vdesc strong{color:#7aa8e8}

/* ── Phone frame ── */
.phone{
  width:390px;height:844px;background:var(--bg);
  border-radius:48px;overflow:hidden;position:relative;
  flex-shrink:0;
  box-shadow:
    0 0 0 10px #141928,
    0 0 0 11px #0a0c14,
    0 0 0 12px #1a2340,
    0 50px 100px rgba(0,0,0,.7),
    inset 0 0 0 1px rgba(255,255,255,.06);
}

/* ── Status bar ── */
.sbar{
  height:44px;background:var(--bg);display:flex;
  align-items:center;justify-content:space-between;
  padding:0 22px;position:sticky;top:0;z-index:20;
}
.stime{font-size:15px;font-weight:700;color:var(--ons)}
.sicons{display:flex;gap:5px;align-items:center;color:var(--ons)}

/* ── Screen ── */
.scr{height:calc(844px - 44px - 34px);overflow-y:auto;overflow-x:hidden;position:relative}
.scr::-webkit-scrollbar{display:none}

/* ── Home bar ── */
.hbar{height:34px;background:var(--bg);display:flex;align-items:center;justify-content:center}
.hpill{width:120px;height:5px;background:var(--ons);border-radius:100px;opacity:.15}

/* ── Common ── */
.tbar{
  padding:0 4px;display:flex;align-items:center;gap:2px;
  height:56px;background:var(--bg);position:sticky;top:0;z-index:10;
}
.tbar-t{
  font-family:'Fraunces',serif;font-weight:600;font-size:22px;
  flex:1;padding:0 8px;color:var(--ons);white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis;
}
.ltbar{padding:12px 16px 14px;background:var(--bg)}
.ltbar-t{font-family:'Fraunces',serif;font-weight:600;font-size:32px;color:var(--ons);line-height:1.1}

.tbtn{
  background:none;border:none;color:var(--pr);font-family:'Plus Jakarta Sans',sans-serif;
  font-size:14px;font-weight:600;padding:8px 10px;cursor:pointer;border-radius:8px;
  white-space:nowrap;
}
.tbtn.muted{color:var(--onsv)}
.ibtn{
  width:48px;height:48px;border:none;background:none;
  display:flex;align-items:center;justify-content:center;
  border-radius:100px;cursor:pointer;color:var(--ons);flex-shrink:0;
}

.sbar2{
  margin:6px 16px 2px;height:52px;border:1.5px solid var(--out);
  border-radius:28px;display:flex;align-items:center;padding:0 16px;
  gap:12px;background:var(--surf);cursor:text;
}
.sph{font-size:16px;color:var(--onsv);flex:1}

.chips{display:flex;gap:8px;padding:4px 16px 8px;overflow-x:auto}
.chips::-webkit-scrollbar{display:none}
.chip{
  flex-shrink:0;height:32px;border-radius:8px;padding:0 12px;
  display:flex;align-items:center;gap:5px;font-size:14px;font-weight:500;
  cursor:pointer;border:1.5px solid var(--out);background:transparent;
  color:var(--ons);transition:all .15s;user-select:none;
}
.chip.on{background:var(--oprc);border-color:var(--oprc);color:#fff}
.chip.sec{background:var(--secc);border-color:transparent;color:var(--osecc)}
.chip:hover{background:var(--surfv)}
.chip.on:hover{background:var(--oprc)}

.div{height:1px;background:var(--out)}

/* Cards */
.cgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:12px 16px 16px}
.dcard{
  background:var(--surf);border-radius:16px;overflow:hidden;
  box-shadow:0 1px 4px rgba(0,0,0,.08),0 0 0 1px rgba(0,0,0,.04);
  cursor:pointer;transition:transform .12s;
}
.dcard:active{transform:scale(.97)}
.dcimg{height:120px;width:100%}
.dcbody{padding:10px}
.dcname{font-size:14px;font-weight:600;color:var(--ons);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dcprov{font-size:12px;color:var(--onsv);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Bottom sheet */
.ov{
  position:absolute;inset:0;background:rgba(0,0,0,.5);z-index:100;
  display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .22s;
}
.ov.open{opacity:1;pointer-events:all}
.sh{
  width:100%;background:var(--surf);border-radius:28px 28px 0 0;
  padding-bottom:32px;transform:translateY(100%);
  transition:transform .3s cubic-bezier(.34,1.4,.64,1);
}
.ov.open .sh{transform:translateY(0)}
.handle{width:32px;height:4px;background:var(--out);border-radius:2px;margin:10px auto 14px}
.shimg{margin:0 16px;border-radius:16px;height:200px;overflow:hidden}
.shcnt{padding:16px 24px 0}
.sht{font-family:'Fraunces',serif;font-size:24px;font-weight:600;color:var(--ons)}
.shs{font-size:14px;color:var(--onsv);margin-top:4px;display:flex;align-items:center;gap:5px}
.rrow{display:flex;align-items:center;gap:6px;margin-top:8px}
.rv{font-size:15px;font-weight:600;color:var(--ons)}
.rc{font-size:13px;color:var(--onsv)}

.bstack{display:flex;flex-direction:column;gap:8px;margin-top:20px}
.btn{
  width:100%;height:48px;border-radius:100px;border:none;
  font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:600;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  gap:8px;transition:opacity .15s;
}
.btnp{background:var(--pr);color:#fff}
.btno{background:transparent;border:1.5px solid var(--out);color:var(--ons)}
.btng{background:transparent;color:var(--pr)}
.btn:disabled{opacity:.4}

/* Bottom nav */
.bnav{
  background:var(--surf);border-top:1px solid var(--out);
  display:flex;height:64px;flex-shrink:0;
}
.bni{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:3px;cursor:pointer;color:var(--onsv);
  font-size:11px;font-weight:500;
}
.bni.on{color:var(--pr)}
.bni-ind{
  width:64px;height:32px;border-radius:100px;
  display:flex;align-items:center;justify-content:center;
}
.bni.on .bni-ind{background:var(--prc)}

/* Poll banner */
.pbanner{
  background:var(--secc);padding:10px 16px;display:flex;
  align-items:center;gap:8px;cursor:pointer;
}
.pbtext{font-size:14px;font-weight:500;color:var(--osecc);flex:1}
.pbclose{
  width:32px;height:32px;border:none;background:none;color:var(--osecc);
  cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:100px;
}

/* Section labels */
.slbl{
  font-size:12px;font-weight:700;color:var(--sec);
  padding:12px 16px 4px;letter-spacing:.06em;text-transform:uppercase;
}
.slbl.m{color:var(--onsv)}

/* POI list card */
.pcard{
  background:var(--surf);margin:4px 16px;border-radius:12px;
  padding:12px;display:flex;gap:12px;align-items:center;
  box-shadow:0 1px 4px rgba(0,0,0,.06);cursor:pointer;
}
.pcimg{width:80px;height:80px;border-radius:10px;flex-shrink:0;overflow:hidden}
.pcbody{flex:1;min-width:0}
.pcname{font-size:14px;font-weight:600;color:var(--ons);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pcaddr{font-size:12px;color:var(--onsv);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prating{display:flex;align-items:center;gap:4px;margin-top:6px}
.prv{font-size:12px;font-weight:600;color:var(--ons)}
.prc{font-size:12px;color:var(--onsv)}

/* Empty state */
.empty{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:300px;gap:8px;color:var(--onsv);text-align:center;padding:32px;
}
.ei{font-size:40px;margin-bottom:8px}

/* ═══════ EDITORIAL (B) ═══════ */
.ehero{height:270px;position:relative;overflow:hidden;flex-shrink:0}
.eover{
  position:absolute;inset:0;
  background:linear-gradient(to top,rgba(10,12,20,.88) 0%,rgba(0,0,0,.05) 60%);
  display:flex;flex-direction:column;justify-content:flex-end;padding:20px;
}
.erl{
  font-family:'Fraunces',serif;font-size:11px;font-weight:300;
  color:rgba(255,255,255,.65);letter-spacing:.18em;text-transform:uppercase;margin-bottom:4px;
}
.edn{font-family:'Fraunces',serif;font-size:38px;font-weight:600;color:#fff;line-height:1.05}
.emeta{font-size:13px;color:rgba(255,255,255,.7);margin-top:6px;display:flex;align-items:center;gap:8px}
.etabs{
  display:flex;overflow-x:auto;gap:0;background:var(--surf);
  border-bottom:1px solid var(--out);
}
.etabs::-webkit-scrollbar{display:none}
.etab{
  flex-shrink:0;padding:13px 15px;font-size:13px;font-weight:600;
  color:var(--onsv);cursor:pointer;position:relative;white-space:nowrap;
}
.etab.on{color:var(--pr)}
.etab.on::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:3px;
  background:var(--pr);border-radius:2px 2px 0 0;
}
.elist-item{
  display:flex;gap:12px;align-items:center;padding:12px 16px;
  cursor:pointer;border-bottom:1px solid var(--outv);
}
.eli-img{width:80px;height:56px;border-radius:10px;overflow:hidden;flex-shrink:0}
.eli-name{font-size:15px;font-weight:600;color:var(--ons)}
.eli-sub{font-size:12px;color:var(--onsv);margin-top:2px;display:flex;align-items:center;gap:5px}

/* ═══════ SEARCH-FIRST (C) ═══════ */
.shero{padding:20px 16px 20px;background:var(--pr)}
.sht2{font-family:'Fraunces',serif;font-size:28px;font-weight:600;color:#fff;margin-bottom:12px;line-height:1.1}
.sbox{
  height:48px;background:rgba(255,255,255,.95);border-radius:12px;
  display:flex;align-items:center;padding:0 14px;gap:10px;
}
.si{font-size:14px;color:var(--onsv);flex:1}
.rlist{display:flex;flex-direction:column}
.ritem{
  display:flex;align-items:center;gap:12px;padding:13px 16px;
  border-bottom:1px solid var(--outv);cursor:pointer;
}
.ritem.on{background:var(--prc)}
.rdot{width:40px;height:40px;border-radius:12px;overflow:hidden;flex-shrink:0}
.rname{font-size:15px;font-weight:600;color:var(--ons)}
.rcnt{font-size:12px;color:var(--onsv);margin-top:1px}
.rchev{margin-left:auto;color:var(--onsv);transition:transform .2s}
.ritem.on .rchev{transform:rotate(90deg);color:var(--oprc)}
.ditem{
  display:flex;align-items:center;padding:11px 16px;
  border-bottom:1px solid var(--outv);gap:12px;cursor:pointer;
}
.dnum{
  width:28px;height:28px;border-radius:100px;background:var(--prc);
  color:var(--oprc);display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;flex-shrink:0;
}
.dnam{font-size:14px;font-weight:500;color:var(--ons);flex:1}
.drat{font-size:13px;font-weight:600;color:var(--onsv);display:flex;align-items:center;gap:3px}

/* ═══════ POLL A ═══════ */
.phdr{background:var(--surf);padding:14px 16px;border-bottom:1px solid var(--out)}
.ptchip{
  display:inline-flex;align-items:center;gap:6px;background:var(--secc);
  color:var(--osecc);border-radius:100px;padding:4px 12px;font-size:12px;
  font-weight:600;margin-bottom:8px;
}
.ptitle{font-family:'Fraunces',serif;font-size:22px;font-weight:600;color:var(--ons)}
.pmeta{font-size:13px;color:var(--onsv);margin-top:4px}
.pcandy{
  background:var(--surf);margin:6px 16px;border-radius:12px;padding:12px;
  display:flex;gap:12px;align-items:center;
  box-shadow:0 1px 4px rgba(0,0,0,.06);cursor:pointer;
}
.pcimg2{width:72px;height:72px;border-radius:10px;flex-shrink:0;overflow:hidden}
.pcbody2{flex:1;min-width:0}
.pcname2{font-size:15px;font-weight:600;color:var(--ons)}
.pcvotes{font-size:13px;color:var(--onsv);margin-top:2px}
.vbar{height:4px;background:var(--surfv);border-radius:2px;margin-top:8px;overflow:hidden}
.vfill{height:100%;background:var(--sec);border-radius:2px}
.thumbbtn{
  width:44px;height:44px;border-radius:100px;border:1.5px solid var(--out);
  background:transparent;display:flex;flex-direction:column;align-items:center;
  justify-content:center;cursor:pointer;flex-shrink:0;gap:2px;transition:all .15s;
}
.thumbbtn.on{background:var(--secc);border-color:var(--sec)}
.thumbbtn svg{transition:all .15s}
.thumbbtn.on svg{stroke:var(--sec)}
.tcnt{font-size:10px;font-weight:600;color:var(--onsv)}
.thumbbtn.on .tcnt{color:var(--sec)}

/* ═══════ POLL B – CARD STACK ═══════ */
.scard{margin:6px 16px;border-radius:20px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.12);cursor:pointer}
.scard-hero{height:180px;position:relative}
.scard-ov{
  position:absolute;inset:0;
  background:linear-gradient(to top,rgba(0,0,0,.75),transparent);
  display:flex;align-items:flex-end;padding:14px;gap:10px;
}
.scname{font-family:'Fraunces',serif;font-size:22px;font-weight:600;color:#fff;flex:1}
.sthumbs{
  width:52px;height:52px;border-radius:100px;background:rgba(255,255,255,.18);
  backdrop-filter:blur(8px);display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:2px;border:1.5px solid rgba(255,255,255,.35);flex-shrink:0;
}
.sthumbs.on{background:var(--sec);border-color:var(--sec)}
.scard-foot{
  background:var(--surf);padding:10px 14px;display:flex;
  align-items:center;gap:12px;
}
.svbar{flex:1;height:6px;background:var(--surfv);border-radius:3px;overflow:hidden}
.svfill{height:100%;background:linear-gradient(90deg,var(--sec),var(--pr));border-radius:3px}
.slabel{font-size:13px;font-weight:600;color:var(--onsv)}

/* ═══════ POLL C – PODIUM ═══════ */
.pdwrap{padding:12px 16px}
.pditem{
  display:flex;align-items:center;gap:12px;padding:12px;border-radius:14px;
  margin-bottom:8px;background:var(--surf);
  box-shadow:0 1px 4px rgba(0,0,0,.06);cursor:pointer;
}
.pditem.r1{background:linear-gradient(135deg,#fef3c7,#fde68a);box-shadow:0 4px 16px rgba(217,119,6,.18)}
.pditem.r2{background:linear-gradient(135deg,var(--surfv),#e2e8f0)}
.pditem.r3{background:linear-gradient(135deg,#fee2e2,#fecaca)}
.pdrank{width:32px;height:32px;border-radius:100px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.pdimg{width:56px;height:56px;border-radius:12px;overflow:hidden;flex-shrink:0}
.pdname{font-size:15px;font-weight:600;color:var(--ons);flex:1}
.pdvc{font-size:24px;font-weight:700;color:var(--ons);text-align:center}
.pdvl{font-size:10px;color:var(--onsv);text-align:center}

/* ═══════ L2 GRID (B) ═══════ */
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:8px 16px 16px}
.pgcard{border-radius:14px;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.1);cursor:pointer;position:relative}
.pgcimg{height:130px}
.pgcov{
  position:absolute;bottom:0;left:0;right:0;padding:10px;
  background:linear-gradient(to top,rgba(0,0,0,.76),transparent);
}
.pgname{font-size:13px;font-weight:600;color:#fff;line-height:1.3}
.pgrat{font-size:11px;color:rgba(255,255,255,.8);display:flex;align-items:center;gap:3px;margin-top:3px}
.topbadge{
  position:absolute;top:8px;left:8px;background:var(--pr);color:#fff;
  font-size:10px;font-weight:700;padding:3px 8px;border-radius:100px;
}
.segs{
  display:flex;margin:6px 16px 0;border-radius:10px;overflow:hidden;
  border:1.5px solid var(--out);
}
.seg{
  flex:1;height:36px;background:var(--surfv);color:var(--onsv);
  display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;
  cursor:pointer;border-right:1px solid var(--out);
}
.seg:last-child{border-right:none}
.seg.on{background:var(--oprc);color:#fff;border-color:var(--oprc)}

/* ═══════ L2 MAGAZINE (C) ═══════ */
.mhero{height:196px;position:relative;margin:8px 16px;border-radius:20px;overflow:hidden;cursor:pointer}
.mhov{
  position:absolute;inset:0;
  background:linear-gradient(to top,rgba(0,0,0,.82),rgba(0,0,0,.08));
  padding:16px;display:flex;flex-direction:column;justify-content:flex-end;
}
.mbadge{
  background:var(--pr);color:#fff;font-size:10px;font-weight:700;
  padding:3px 10px;border-radius:100px;align-self:flex-start;margin-bottom:8px;
}
.mname{font-family:'Fraunces',serif;font-size:26px;font-weight:600;color:#fff}
.mmeta{font-size:12px;color:rgba(255,255,255,.72);margin-top:4px;display:flex;align-items:center;gap:8px}
.mli{
  display:flex;align-items:center;gap:10px;padding:10px 16px;
  border-bottom:1px solid var(--outv);cursor:pointer;
}
.mlico{
  width:36px;height:36px;border-radius:10px;background:var(--surfv);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px;
}
.mlname{font-size:14px;font-weight:600;color:var(--ons);flex:1}
.mlrat{font-size:13px;font-weight:600;color:var(--onsv);display:flex;align-items:center;gap:3px}

/* Image gradients */
.i-patagonia{background:linear-gradient(135deg,#0c4a6e 0%,#0284c7 45%,#064e3b 100%)}
.i-cuyo{background:linear-gradient(135deg,#7c2d12 0%,#b45309 55%,#78350f 100%)}
.i-noroeste{background:linear-gradient(135deg,#78350f 0%,#d97706 55%,#ca8a04 100%)}
.i-litoral{background:linear-gradient(135deg,#14532d 0%,#16a34a 55%,#0891b2 100%)}
.i-bsas{background:linear-gradient(135deg,#1e3a8a 0%,#2563eb 55%,#0f172a 100%)}
.i-cordoba{background:linear-gradient(135deg,#166534 0%,#d97706 55%,#5b21b6 100%)}
.i-hotel{background:linear-gradient(135deg,#1e3a8a 0%,#3b82f6 50%,#0ea5e9 100%)}
.i-resto{background:linear-gradient(135deg,#92400e 0%,#d97706 55%,#f59e0b 100%)}
.i-activ{background:linear-gradient(135deg,#064e3b 0%,#059669 55%,#16a34a 100%)}
.i-nature{background:linear-gradient(135deg,#14532d 0%,#22c55e 55%,#4ade80 100%)}
.i-ush{background:linear-gradient(135deg,#0c4a6e 0%,#0ea5e9 60%,#164e63 100%)}
.i-brc{background:linear-gradient(135deg,#1e3a8a 0%,#4f46e5 40%,#0f172a 100%)}
.i-mendoza{background:linear-gradient(135deg,#4c1d95 0%,#7c3aed 40%,#92400e 100%)}
.i-salt{background:linear-gradient(135deg,#78350f 0%,#f59e0b 40%,#b45309 100%)}

let curS = 'l1', curV = 'A';

function setS(s){
  curS = s;
  ['l1','poll','l2'].forEach(x => document.getElementById('s-'+x).classList.toggle('on', x===s));
  render();
}
function setV(v){
  curV = v;
  ['A','B','C'].forEach(x => document.getElementById('v-'+x).classList.toggle('on', x===v));
  render();
}

function bnav(){
  return `<div class="bnav">
    <div class="bni"><div class="bni-ind">${IK.home}</div><span>Inicio</span></div>
    <div class="bni on"><div class="bni-ind">${IK.compass.replace('stroke="currentColor"','stroke="var(--pr)"')}</div><span>Destinos</span></div>
    <div class="bni"><div class="bni-ind">${IK.wallet}</div><span>Gastos</span></div>
    <div class="bni"><div class="bni-ind">${IK.usr}</div><span>Perfil</span></div>
  </div>`;
}

function sheet(imgCls, title, subtitle, rating, reviews, btns){
  return `<div class="ov" id="sh" onclick="if(event.target===this)this.classList.remove('open')">
    <div class="sh">
      <div class="handle"></div>
      <div class="shimg ${imgCls}"></div>
      <div class="shcnt">
        <div class="sht">${title}</div>
        <div class="shs">${IK.loc} ${subtitle}</div>
        <div class="rrow">${IK.star}<span class="rv">${rating}</span><span class="rc">(${reviews} reseñas)</span></div>
        <div class="bstack">${btns}</div>
      </div>
    </div>
  </div>`;
}

function openSheet(){
  const s = document.getElementById('sh');
  if(s) s.classList.add('open');
}
